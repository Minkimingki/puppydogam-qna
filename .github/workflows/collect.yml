name: collect-kin-questions
on:
  schedule:
    - cron: "30 22 * * *"   # 매일 07:30 KST (UTC 22:30)
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch questions
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_kin.py
      - name: Commit results
        run: |
          git config user.name "puppydogam-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "collect: $(date -u +%Y-%m-%d)"
          git push
